<!-- MAIN CONTENT -->
<div class="main-content">

    <h1>Add Employee</h1>

    <!-- ✅ ONLY ONE FORM (IMPORTANT) -->
    <form class="employee-form" id="empForm">

        <label>Employee ID</label>
        <input type="text" id="empId" placeholder="Enter Employee ID" required>

        <label>Name</label>
        <input type="text" id="empName" placeholder="Enter Employee Name" required>

        <label>Department</label>
        <input type="text" id="empDept" placeholder="Enter Department" required>

        <label>Email</label>
        <input type="email" id="empEmail" placeholder="Enter Email" required>

        <label>Phone</label>
        <input type="tel" id="empPhone" placeholder="Enter Phone Number" required>

        <label>Gender</label>

<select id="empGender" required>
    <option value="">Select Gender</option>
    <option value="Male">Male</option>
    <option value="Female">Female</option>
</select>

        <button type="submit">Save Employee</button>

    </form>

</div>
